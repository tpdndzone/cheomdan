<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체험단 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: #2a2a2a;
  --accent: #c8ff00;
  --accent-dim: rgba(200,255,0,0.12);
  --accent-hover: #d4ff33;
  --text: #f0f0f0;
  --text-sub: #888;
  --text-muted: #555;
  --danger: #ff4d4d;
  --danger-dim: rgba(255,77,77,0.12);
  --success: #00e5a0;
  --success-dim: rgba(0,229,160,0.12);
  --info: #6496ff;
  --info-dim: rgba(100,150,255,0.12);
  --radius: 12px;
  --shadow: none;
}

[data-theme="light"] {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface2: #f0f0eb;
  --border: #e0e0d8;
  --accent: #5a8a00;
  --accent-dim: rgba(90,138,0,0.1);
  --accent-hover: #4a7500;
  --text: #1a1a1a;
  --text-sub: #666;
  --text-muted: #aaa;
  --danger: #e03030;
  --danger-dim: rgba(224,48,48,0.1);
  --success: #00a870;
  --success-dim: rgba(0,168,112,0.1);
  --info: #3060d0;
  --info-dim: rgba(48,96,208,0.1);
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; transition: background 0.2s, color 0.2s; }

header { border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); backdrop-filter: blur(10px); z-index: 100; gap: 12px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.logo-text { font-size: 14px; font-weight: 700; color: var(--text); }
.logo-text span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 8px; }
.nav-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); font-size: 12px; cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
.badge-super { color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent); }
.badge-agency { color: var(--success); background: var(--success-dim); border: 1px solid var(--success); }
.badge-adv { color: var(--info); background: var(--info-dim); border: 1px solid var(--info); }
.badge-pending { color: var(--danger); background: var(--danger-dim); border: 1px solid var(--danger); }

.theme-toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border); border: 1px solid var(--border); cursor: pointer; position: relative; transition: background 0.2s; display: flex; align-items: center; padding: 2px; }
.theme-toggle::after { content: ''; width: 14px; height: 14px; border-radius: 50%; background: var(--text-sub); transition: transform 0.2s, background 0.2s; }
[data-theme="light"] .theme-toggle { background: var(--accent-dim); border-color: var(--accent); }
[data-theme="light"] .theme-toggle::after { transform: translateX(16px); background: var(--accent); }

main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.section-title { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }

.steps { display: flex; }
.step { flex: 1; padding: 10px 12px; font-size: 11px; color: var(--text-muted); border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 6px; }
.step.active { color: var(--accent); border-bottom-color: var(--accent); }
.step.done { color: var(--success); border-bottom-color: var(--success); }
.step-num { width: 17px; height: 17px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.step.active .step-num { background: var(--accent); color: #0f0f0f; }
.step.done .step-num { background: var(--success); color: #0f0f0f; }

.row { display: flex; gap: 10px; align-items: center; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--text-sub); }
.input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'Pretendard', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-muted); }
.input-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Pretendard', sans-serif; white-space: nowrap; }
.btn-accent { background: var(--accent); color: #0f0f0f; }
.btn-accent:hover { background: var(--accent-hover); }
.btn-ghost { background: transparent; color: var(--text-sub); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger-dim); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-success { background: transparent; color: var(--success); border: 1px solid var(--success); cursor: default; }
.btn-sm { padding: 5px 11px; font-size: 11px; }
.btn-full { width: 100%; justify-content: center; padding: 11px; }

.auth-wrap { min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 400px; box-shadow: var(--shadow); }
.auth-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.auth-card .auth-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; }
.auth-card .auth-sub a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-link { width: 100%; text-align: center; font-size: 12px; color: var(--text-sub); cursor: pointer; background: none; border: none; font-family: 'Pretendard', sans-serif; margin-top: 12px; }
.auth-link:hover { color: var(--text); }

.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.type-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 12px; cursor: pointer; transition: all 0.15s; }
.type-card:hover { border-color: var(--text-muted); }
.type-card.selected { border-color: var(--accent); background: var(--accent-dim); }
.type-card .tc-icon { font-size: 22px; margin-bottom: 6px; }
.type-card .tc-name { font-size: 13px; font-weight: 700; color: var(--text); }
.type-card.selected .tc-name { color: var(--accent); }

.camp-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.camp-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
.camp-row:hover, .camp-row.active { border-color: var(--accent); background: var(--accent-dim); }
.camp-name { flex: 1; font-weight: 600; font-size: 14px; }
.camp-meta { font-size: 11px; color: var(--text-muted); }

.upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 36px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone h3 { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
.upload-zone p { color: var(--text-sub); font-size: 12px; }
.file-ext { display: inline-block; margin-top: 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 4px; }
.upload-ok { display: none; align-items: center; gap: 12px; padding: 12px 16px; background: var(--success-dim); border: 1px solid var(--success); border-radius: 10px; margin-top: 12px; }
.upload-ok.show { display: flex; }
.upload-ok strong { font-size: 13px; font-weight: 600; color: var(--success); }
.upload-ok p { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 16px; }
.stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.stat-box .num { font-size: 24px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
.stat-box .lbl { font-size: 11px; color: var(--text-sub); margin-top: 3px; }

.preview-wrap { overflow-x: auto; margin-top: 12px; border: 1px solid var(--border); border-radius: 10px; max-height: 180px; overflow-y: auto; }
.ptable { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
.ptable th { background: var(--surface2); color: var(--text-sub); font-weight: 500; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.ptable td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.ptable tr:last-child td { border-bottom: none; }

.col-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.col-checks label { display: flex; align-items: center; gap: 7px; padding: 7px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 12px; }
.col-checks input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

.adv-list { display: flex; flex-direction: column; gap: 8px; }
.adv-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; }
.adv-idx { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); width: 20px; flex-shrink: 0; }
.adv-name { flex: 1; font-weight: 500; font-size: 13px; }
.adv-link { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.member-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
.member-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.av-super { background: var(--accent-dim); color: var(--accent); }
.av-agency { background: var(--success-dim); color: var(--success); }
.av-adv { background: var(--info-dim); color: var(--info); }
.av-pending { background: var(--danger-dim); color: var(--danger); }
.member-info { flex: 1; }
.member-name { font-size: 13px; font-weight: 600; }
.member-email { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

/* RESULT / SELECTION TABLE */
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); font-size: 11px; font-family: 'Pretendard', sans-serif; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.filter-btn.sel-active { border-color: var(--success); color: var(--success); background: var(--success-dim); }
.filter-btn.rej-active { border-color: var(--danger); color: var(--danger); background: var(--danger-dim); }
.search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 12px; font-family: 'Pretendard', sans-serif; outline: none; min-width: 160px; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }

.camp-tabs, .adv-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
.camp-tab, .adv-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-sub); font-size: 12px; font-family: 'Pretendard', sans-serif; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.camp-tab:hover, .adv-tab:hover { border-color: var(--text-muted); color: var(--text); }
.camp-tab.active, .adv-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--success); }
.dot-pending { background: var(--text-muted); }

.rtable-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
.rtable { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
.rtable th { background: var(--surface2); color: var(--text-sub); font-weight: 500; font-size: 10px; padding: 10px 13px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.rtable th.private { color: var(--danger); }
.rtable td { padding: 10px 13px; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid var(--border); }
.rtable tr:last-child td { border-bottom: none; }
.rtable tr:hover td { background: var(--surface2); }
.rtable tr.row-sel td { background: var(--success-dim); }
.rtable tr.row-rej td { background: var(--danger-dim); opacity: 0.7; }

.btn-sel, .btn-rej { padding: 4px 10px; border-radius: 6px; border: 1px solid; font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Pretendard', sans-serif; }
.btn-sel { border-color: var(--success); color: var(--success); background: transparent; }
.btn-sel:hover, .btn-sel.active { background: var(--success); color: #0f0f0f; }
.btn-rej { border-color: var(--danger); color: var(--danger); background: transparent; }
.btn-rej:hover, .btn-rej.active { background: var(--danger); color: #fff; }
.btn-sel:disabled, .btn-rej:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-kakao { padding: 3px 9px; border-radius: 6px; border: none; background: #FEE500; color: #3C1E1E; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Pretendard', sans-serif; white-space: nowrap; }
.conf-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; background: var(--success-dim); border: 1px solid var(--success); color: var(--success); font-size: 11px; font-weight: 600; }
.pend-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-size: 11px; }

.delete-card { background: var(--surface); border: 1px solid var(--danger-dim); border-radius: var(--radius); padding: 22px; }
.del-confirm { background: var(--danger-dim); border: 1px solid var(--danger); border-radius: 10px; padding: 14px 18px; margin-top: 12px; display: none; }
.del-confirm.show { display: block; }
.del-confirm p { font-size: 13px; color: var(--danger); margin-bottom: 10px; }

.profile-sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 8px; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--danger); }
.toast.success-t { border-color: var(--success); }

.empty { text-align: center; padding: 28px; color: var(--text-muted); font-size: 13px; }
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
.error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 14px; color: var(--text-sub); text-align: center; }
.error-code { font-family: 'DM Mono', monospace; font-size: 42px; color: var(--danger); }
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"><span id="ti">✅</span><span id="tm"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const FC = {
  apiKey:"AIzaSyA0dUb1p0wAWZHvDPlmG_WO3QJ7xhSYJ5s",
  authDomain:"dscrew-6da8c.firebaseapp.com",
  projectId:"dscrew-6da8c",
  storageBucket:"dscrew-6da8c.firebasestorage.app",
  messagingSenderId:"235741797636",
  appId:"1:235741797636:web:5e9c9cf83751fc0504c451"
};
const app = initializeApp(FC);
const db = getFirestore(app);
const auth = getAuth(app);

const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
window.toggleTheme = function() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
};

const params = new URLSearchParams(location.search);
const PAGE = params.get('page') || 'login';
const CAMP_ID = params.get('c');
const TOKEN = params.get('t');

window.go = function(page, extra='') { location.href = `${location.pathname}?page=${page}${extra}`; }
window.url = function(page, extra='') { return `${location.pathname}?page=${page}${extra}`; }

let toastTimer;
window.toast = function(icon, msg, type='') {
  const el = document.getElementById('toast');
  document.getElementById('ti').textContent = icon;
  document.getElementById('tm').textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
};

function cell(v) {
  if (!v) return '-';
  return String(v).replace(/(https?:\/\/[^\s]+)/g, u =>
    `<a href="${u}" target="_blank" style="color:var(--accent);text-decoration:underline">${u}</a>`);
}

function themeBtn() {
  return `<button class="theme-toggle" onclick="toggleTheme()" title="테마 변경"></button>`;
}

let currentUser = null;
let currentUserData = null;

async function getUserData(uid) {
  const d = await getDoc(doc(db, 'users', uid));
  return d.exists() ? d.data() : null;
}

function renderHeader(userData) {
  const role = userData?.role;
  const isSuper = role === 'super';
  const isAgency = role === 'agency';
  const isAdv = role === 'advertiser';
  const roleMap = { super: '총관리자', agency: '대행사', advertiser: '광고주' };
  const badgeClass = { super: 'badge-super', agency: 'badge-agency', advertiser: 'badge-adv' };

  return `<header>
    <div class="logo"><div class="logo-dot"></div><div class="logo-text">체험단 <span>관리</span></div></div>
    <div class="header-right">
      ${(isSuper || isAgency) ? `<a class="nav-btn ${PAGE==='admin'?'active':''}" href="${url('admin')}">🗂 관리</a>` : ''}
      ${(isSuper || isAgency || isAdv) ? `<a class="nav-btn ${PAGE==='result'?'active':''}" href="${url('result')}">✔ 선정/결과</a>` : ''}
      ${isSuper ? `<a class="nav-btn ${PAGE==='members'?'active':''}" href="${url('members')}">👥 회원</a>` : ''}
      ${userData ? `<a class="nav-btn ${PAGE==='profile'?'active':''}" href="${url('profile')}">⚙ 내정보</a>` : ''}
      ${themeBtn()}
      ${userData ? `<span class="badge ${badgeClass[role]||''}">${roleMap[role]||''}</span>` : ''}
      ${userData ? `<button class="btn btn-ghost btn-sm" onclick="window._logout()">로그아웃</button>` : ''}
    </div>
  </header>`;
}

window._logout = async function() {
  await signOut(auth);
  go('login');
};

// ══════════════════════════════════════════════════════
// LOGIN PAGE
// ══════════════════════════════════════════════════════
async function renderLogin() {
  document.getElementById('root').innerHTML = `
    <header>
      <div class="logo"><div class="logo-dot"></div><div class="logo-text">체험단 <span>관리</span></div></div>
      <div class="header-right">${themeBtn()}</div>
    </header>
    <div class="auth-wrap">
      <div class="auth-card">
        <h2>로그인</h2>

        <div class="field" style="margin-bottom:16px"><label>비밀번호</label><input class="input" id="lpw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')window._login()"></div>
        <button class="btn btn-accent btn-full" onclick="window._login()">로그인</button>

window._login = async function() {
  const email = document.getElementById('lemail').value.trim();
  const pw = document.getElementById('lpw').value;
  if (!email || !pw) { toast('⚠️','이메일과 비밀번호를 입력하세요','error'); return; }
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const ud = await getUserData(cred.user.uid);
    if (!ud) { await signOut(auth); toast('⚠️','계정 정보를 찾을 수 없습니다','error'); return; }
    if (ud.status === 'pending') { await signOut(auth); toast('⚠️','승인 대기 중입니다. 관리자에게 문의하세요','error'); return; }
    const redirect = params.get('redirect');
    const rc = params.get('c');
    const rt = params.get('t');
    if (redirect === 'viewer' && rc && rt) {
      if (ud.role === 'advertiser') {
        const conns = ud.connections||[];
        if (!conns.find(c=>c.campId===rc&&c.token===rt)) {
          conns.push({campId:rc, token:rt});
          await setDoc(doc(db,'users',cred.user.uid), { connections:conns }, { merge:true });
        }
      }
      go('result'); return;
    }
    if (ud.role === 'advertiser') { go('result'); return; }
    go('admin');
  } catch(e) {
    toast('❌','이메일 또는 비밀번호가 올바르지 않습니다','error');
  }
};

let selectedType = '';

  const tnAdv = document.getElementById('tn-advertiser');

window._register = async function() {
  if (!selectedType) { toast('⚠️','가입 유형을 선택하세요','error'); return; }
  const name = document.getElementById('rname').value.trim();
  const company = document.getElementById('rcompany').value.trim();
  const email = document.getElementById('remail').value.trim();
  const pw = document.getElementById('rpw').value;
  const pw2 = document.getElementById('rpw2').value;
  if (!name || !email || !pw) { toast('⚠️','필수 항목을 입력하세요','error'); return; }
  if (pw !== pw2) { toast('⚠️','비밀번호가 일치하지 않습니다','error'); return; }
  if (pw.length < 6) { toast('⚠️','비밀번호는 6자 이상이어야 합니다','error'); return; }
  const redirect = params.get('redirect');
  const rc = params.get('c');
  const rt = params.get('t');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    const status = selectedType === 'advertiser' ? 'active' : 'pending';
    const userData = { uid:cred.user.uid, name, company, email, role:selectedType, status, createdAt:serverTimestamp() };
    if (selectedType === 'advertiser' && redirect === 'viewer' && rc && rt) {
      userData.connections = [{campId:rc, token:rt}];
    }
    await setDoc(doc(db,'users',cred.user.uid), userData);
    await signOut(auth);
    if (selectedType === 'advertiser') {
      toast('✅','가입이 완료되었습니다. 바로 로그인하세요!','success-t');
      if (redirect === 'viewer' && rc && rt) {
        setTimeout(() => go('login', `&redirect=viewer&c=${rc}&t=${rt}`), 2500);
      } else {
        setTimeout(() => go('login'), 2500);
      }
    } else {
      toast('✅','가입 신청이 완료되었습니다. 관리자 승인 후 이용 가능합니다','success-t');
      setTimeout(() => go('login'), 2500);
    }
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') toast('❌','이미 사용 중인 이메일입니다','error');
    else toast('❌','가입 중 오류가 발생했습니다','error');
  }
};

let allMembers = [], mFilter = 'all';
async function loadMembers() {
  const snap = await getDocs(collection(db, 'users'));
  allMembers = [];
  snap.forEach(d => allMembers.push(d.data()));
  allMembers.sort((a,b) => (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  window._filterMembers();
}

window._setMFilter = function(f) {
  mFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`f${f}`)?.classList.add('active');
  window._filterMembers();
};

window._filterMembers = function() {
  const q = document.getElementById('msearch')?.value.toLowerCase() || '';
  let list = allMembers;
  if (mFilter === 'pending') list = list.filter(m => m.status === 'pending');
  else if (mFilter !== 'all') list = list.filter(m => m.role === mFilter && m.status !== 'pending');
  if (q) list = list.filter(m => m.name?.toLowerCase().includes(q) || m.email?.toLowerCase().includes(q));
  renderMemberList(list);
};

function renderMemberList(list) {
  const el = document.getElementById('memberList');
  if (!list.length) { el.innerHTML = '<div class="empty">회원이 없습니다</div>'; return; }
  const roleMap = { super:'총관리자', agency:'대행사', advertiser:'광고주' };
  const badgeClass = { super:'badge-super', agency:'badge-agency', advertiser:'badge-adv' };
  const avClass = { super:'av-super', agency:'av-agency', advertiser:'av-adv' };
  el.innerHTML = list.map(m => {
    const isPending = m.status === 'pending';
    return `<div class="member-row" style="${isPending?'border-color:var(--danger)':''}">
      <div class="member-avatar ${isPending?'av-pending':avClass[m.role]||'av-agency'}">${(m.name||'?')[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name||'-'} ${m.company?`<span style="font-size:11px;color:var(--text-muted)">(${m.company})</span>`:''}</div>
        <div class="member-email">${m.email||'-'}</div>
      </div>
      ${isPending
        ? `<span class="badge badge-pending">승인대기</span>
           <button class="btn btn-sm" style="color:var(--success);border:1px solid var(--success);background:transparent" onclick="window._approve('${m.uid}')">승인</button>
           <button class="btn btn-danger btn-sm" onclick="window._deleteUser('${m.uid}')">거절</button>`
        : `<span class="badge ${badgeClass[m.role]||''}">${roleMap[m.role]||m.role}</span>
           <button class="btn btn-ghost btn-sm" onclick="window._editRole('${m.uid}','${m.role}')">권한변경</button>
           ${m.role!=='super'?`<button class="btn btn-danger btn-sm" onclick="window._deleteUser('${m.uid}')">삭제</button>`:''}`
      }
    </div>`;
  }).join('');
}

          <div class="field"><label>비밀번호 확인</label><input class="input" id="pnewpw2" type="password" placeholder="재입력"></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-accent" style="flex:1" onclick="window._saveProfile()">저장</button>
          <button class="btn btn-danger btn-sm" onclick="window._logout()">로그아웃</button>

window._saveProfile = async function() {
  const name = document.getElementById('pname').value.trim();
  const company = document.getElementById('pcompany').value.trim();
  const curpw = document.getElementById('pcurpw').value;
  const newpw = document.getElementById('pnewpw').value;
  const newpw2 = document.getElementById('pnewpw2').value;
  if (!name) { toast('⚠️','이름을 입력하세요','error'); return; }
  await setDoc(doc(db,'users',currentUser.uid), { name, company }, { merge:true });
  if (newpw) {
    if (newpw !== newpw2) { toast('⚠️','비밀번호가 일치하지 않습니다','error'); return; }
    if (!curpw) { toast('⚠️','현재 비밀번호를 입력하세요','error'); return; }
    try {
      const cred = EmailAuthProvider.credential(currentUser.email, curpw);
      await reauthenticateWithCredential(currentUser, cred);
      await updatePassword(currentUser, newpw);
      toast('✅','정보와 비밀번호가 변경되었습니다','success-t');
    } catch(e) { toast('❌','현재 비밀번호가 올바르지 않습니다','error'); return; }
  } else {
    toast('✅','정보가 저장되었습니다','success-t');
  }
};

  window._sc = async function(id) {
    campId=id; rows=[]; headers=[]; advs=[];

    const rs = await getDocs(collection(db,'campaigns',id,'rows'));
    rs.forEach(d=>rows.push(d.data()));
    rows.sort((a,b)=>(a._index||0)-(b._index||0));
    if (rows.length) headers = data.headers||Object.keys(rows[0]).filter(k=>!k.startsWith('_'));
    const as = await getDocs(collection(db,'campaigns',id,'advertisers'));
    as.forEach(d=>advs.push({id:d.id,...d.data()}));
    await loadCamps();
    en('sec2'); const s5=document.getElementById('sec5'); if(s5)s5.style.display='block';

    uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');if(e.dataTransfer.files[0])pfile(e.dataTransfer.files[0]);});

    if (!campId){toast('⚠️','먼저 캠페인을 선택하세요','error');return;}
    const reader=new FileReader();
    reader.onload=async function(e){
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        if(!json.length){toast('❌','데이터가 없습니다','error');return;}
        headers=Object.keys(json[0]); rows=json;
        toast('⏳','데이터 저장 중...','');
        for(let i=0;i<json.length;i++) await setDoc(doc(db,'campaigns',campId,'rows',`row_${i}`),{...json[i],_index:i});
        await setDoc(doc(db,'campaigns',campId),{totalRows:json.length,headers},{merge:true});
        showUok(file.name,json.length,headers.length);
        renderStats(); renderPreview(); renderCols(null); setStep(3);
        toast('✅',`${json.length}명 데이터가 저장되었습니다`,'success-t');

  function renderCols(saved){

    cc.innerHTML=headers.map(h=>{

  window._sac=function(v){document.querySelectorAll('#colchecks input[type=checkbox]').forEach(c=>c.checked=v);};

    const checked=[...document.querySelectorAll('#colchecks input[type=checkbox]:checked')].map(c=>c.value);

    en('sec4'); renderAdvs(); setStep(4); toast('✅','항목이 저장되었습니다','success-t');
  };

  function getAdvLink(token){return `${location.origin}${location.pathname}?page=viewer&c=${campId}&t=${token}`;}

  window._aa=async function(){
    const name=document.getElementById('aname')?.value.trim();
    const max=parseInt(document.getElementById('amax')?.value)||0;
    if(!name){toast('⚠️','광고주 이름을 입력하세요','error');return;}
    if(advs.find(a=>a.name===name)){toast('⚠️','이미 있는 광고주입니다','error');return;}
    const token=Math.random().toString(36).substr(2,10)+Date.now().toString(36);
    await setDoc(doc(db,'campaigns',campId,'advertisers',token),{name,token,maxSelect:max,createdAt:new Date().toISOString()});
    await setDoc(doc(db,'campaigns',campId),{advCount:advs.length+1},{merge:true});
    advs.push({id:token,name,token,maxSelect:max});
    const an=document.getElementById('aname'); if(an)an.value='';
    const am=document.getElementById('amax'); if(am)am.value='';
    const st2=document.getElementById('st2'); if(st2)st2.textContent=advs.length;
    renderAdvs(); setStep(5); toast('✅',`${name} 링크가 생성되었습니다`,'success-t');
  };

  function renderAdvs(){
    const list=document.getElementById('advList'); if(!list)return;
    if(!advs.length){list.innerHTML='<div class="empty">광고주를 추가하면 고유 링크가 생성됩니다</div>';return;}
    list.innerHTML=advs.map((a,i)=>{
      const lk=getAdvLink(a.token);
      return `<div class="adv-row">
        <div class="adv-idx">${String(i+1).padStart(2,'0')}</div>
        <div class="adv-name">${a.name}${a.maxSelect?` <span style="font-size:10px;color:var(--text-muted)">· 최대 ${a.maxSelect}명</span>`:''}</div>
        <div class="adv-link" title="${lk}">${lk}</div>
        <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText('${lk}').then(()=>toast('✅','링크 복사됨'))">복사</button>
        <button class="btn btn-ghost btn-sm" onclick="window.open('${lk}','_blank')">열기</button>
        <button class="btn btn-danger btn-sm" onclick="window._ra('${a.token}','${a.name}')">삭제</button>
      </div>`;
    }).join('');
  }

  window._ra=async function(token,name){
    await deleteDoc(doc(db,'campaigns',campId,'advertisers',token));
    advs=advs.filter(a=>a.token!==token);
    renderAdvs(); toast('🗑️',`${name} 링크가 삭제되었습니다`);
  };

  window._dconf=function(){const d=document.getElementById('dconf');if(d)d.classList.add('show');};
  window._del=async function(){
    if(!campId)return;
    for(const sub of['rows','advertisers','selections','confirmed']){
      const snap=await getDocs(collection(db,'campaigns',campId,sub));
      for(const d of snap.docs) await deleteDoc(d.ref);
    }
    await deleteDoc(doc(db,'campaigns',campId));
    campId=null;rows=[];headers=[];advs=[];
    const s5=document.getElementById('sec5');if(s5)s5.style.display='none';
    const s3=document.getElementById('sec3');if(s3)s3.style.display='none';
    dis('sec2');dis('sec4');window._ru();setStep(1);
    toast('🗑️','캠페인이 삭제되었습니다');
    await loadCamps();
  };

  await loadCamps();
}

async function renderResult(userData) {
  const isAdv = userData?.role === 'advertiser';
  const isSuper = userData?.role === 'super';
  const isAgency = userData?.role === 'agency';

  let camps=[], selCampId=null, campData={}, allData=[], advs=[], confMap={}, selMap={}, selToken=null, curFilter='all', curSels={}, curIsConf=false;

  // 슈퍼/대행사용 전체 광고주 맵
  let allAdvMap = {}; // token -> adv info
  // 광고주용 connections
  let advConns = [];
  let selConnIdx = 0;
  let selAdvToken = null;

  async function loadData() {
    if (isAdv) {
      // 광고주: connections 배열로 연결된 캠페인 목록
      advConns = userData.connections||[];
      if (!advConns.length) {
        document.getElementById('mainCard').innerHTML = `
          <div style="font-size:15px;font-weight:700;margin-bottom:20px">안녕하세요, ${userData.name}님 👋</div>
          <p style="font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:1.7">대행사로부터 받은 체험단 선정 링크를 입력하시면 바로 리스트를 확인하실 수 있어요.</p>
          <div class="section-title">선정 링크 입력</div>
          <div class="row" style="margin-bottom:8px">
            <input class="input" id="advLinkInput" placeholder="https://cheomdan.vercel.app/...">
            <button class="btn btn-accent" onclick="window._goAdvLink()">입장</button>
          </div>
          <p style="font-size:11px;color:var(--text-muted);line-height:1.6">· 링크는 대행사에서 카카오톡 또는 이메일로 전달드립니다<br>· 링크가 없으신 경우 담당 대행사에 문의해주세요</p>
          <hr style="border:none;border-top:1px solid var(--border);margin:20px 0">
          <div style="background:var(--surface2);border-radius:10px;padding:14px;font-size:12px;color:var(--text-sub);line-height:1.7">

            체험단 선정 링크는 담당 대행사에서 개별적으로 발송해드립니다. 링크를 받지 못하셨다면 대행사 담당자에게 문의해주세요.
          </div>`;

      }

      const campNames = {};
      for (const c of advConns) {
        const cd = await getDoc(doc(db,'campaigns',c.campId));

    } else {

      const snap = await getDocs(collection(db,'campaigns'));

      if (isAgency) camps = camps.filter(c=>c.createdBy===currentUser.uid);
      camps.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      if (!camps.length) { document.getElementById('mainCard').innerHTML='<div class="empty">캠페인이 없습니다</div>'; return; }

      // 모든 캠페인의 advertisers 로드
      allAdvMap = {};
      for (const camp of camps) {
        const as = await getDocs(collection(db,'campaigns',camp.id,'advertisers'));
        as.forEach(d=>{
          const a = d.data();
          if (!allAdvMap[a.token]) allAdvMap[a.token] = {...a, campsList:[]};
          allAdvMap[a.token].campsList.push({campId:camp.id, campName:camp.name});
        });
      }
      // 연결된 광고주 유저 정보 매핑
      const us = await getDocs(query(collection(db,'users'),where('role','==','advertiser')));
      us.forEach(d=>{
        const ud = d.data();
        const conns2 = ud.connections||[];
        conns2.forEach(conn=>{
          if (allAdvMap[conn.token]) {
            allAdvMap[conn.token].userName = ud.company||ud.name;
            allAdvMap[conn.token].linked = true;
          }
        });
      });

      renderAdvListView();
      const firstToken = Object.keys(allAdvMap)[0];
      if (firstToken) await selAdvFromMap(firstToken);
    }
  }

  // 광고주용: connections 기반으로 캠페인 탭 + 내용 표시
  async function selAdvConn(idx, campNames) {
    selConnIdx = idx;
    const conn = advConns[idx];
    selCampId=conn.campId; allData=[]; advs=[]; confMap={}; selMap={};
    const cd=await getDoc(doc(db,'campaigns',conn.campId));
    if(!cd.exists()){return;}
    campData=cd.data();
    const rs=await getDocs(collection(db,'campaigns',conn.campId,'rows'));
    rs.forEach(d=>allData.push(d.data()));
    allData.sort((a,b)=>(a._index||0)-(b._index||0));
    const advDoc=await getDoc(doc(db,'campaigns',conn.campId,'advertisers',conn.token));
    if(advDoc.exists()) advs=[{id:advDoc.id,...advDoc.data()}];
    const confDoc=await getDoc(doc(db,'campaigns',conn.campId,'confirmed',conn.token));
    if(confDoc.exists()) confMap[conn.token]=confDoc.data();
    const selDoc=await getDoc(doc(db,'campaigns',conn.campId,'selections',conn.token));
    if(selDoc.exists()) selMap[conn.token]=selDoc.data().selections||{};

    const mc=document.getElementById('mainCard');
    if(!mc) return;
    // campNames가 없으면 현재 campData에서
    const names = campNames||{};
    names[conn.campId] = campData.name;
    mc.innerHTML=`
      <div class="section-title">캠페인 선택</div>
      <div class="camp-tabs">${advConns.map((c,i)=>`<button class="camp-tab ${i===idx?'active':''}" onclick="window._selConn(${i})">${names[c.campId]||c.campId}</button>`).join('')}</div>
      <div id="rcontent" style="margin-top:8px"></div>`;
    if(advs.length) renderAdvView(advs[0].token);
    else { const rc=document.getElementById('rcontent');if(rc)rc.innerHTML='<div class="empty">광고주 정보를 찾을 수 없습니다</div>'; }
  }

  window._selConn = async function(idx) { await selAdvConn(idx, null); };

  // 슈퍼/대행사용: 광고주 탭 먼저
  function renderAdvListView() {
    const mc = document.getElementById('mainCard');
    if (!mc) return;
    const linked = Object.values(allAdvMap).filter(a=>a.linked);
    const unlinked = Object.values(allAdvMap).filter(a=>!a.linked);
    mc.innerHTML = `
      <div class="section-title">광고주 선택</div>
      <div class="adv-tabs" id="advMainTabs">
        ${linked.map(a=>`<button class="adv-tab ${selAdvToken===a.token?'active':''}" onclick="window._selAdvMap('${a.token}')">
          <div class="dot dot-ok"></div>${a.userName}
        </button>`).join('')}
        ${unlinked.length?`<button class="adv-tab ${selAdvToken==='__unlinked__'?'active':''}" onclick="window._selAdvMap('__unlinked__')">
          <div class="dot dot-pending"></div>미연결 (${unlinked.length})
        </button>`:''}
      </div>
      <div id="campTabsArea" style="margin-top:16px"></div>
      <div id="rcontent"></div>`;
  }

  async function selAdvFromMap(token) {
    selAdvToken = token;
    // 탭 active 갱신
    document.querySelectorAll('#advMainTabs .adv-tab').forEach((b,i)=>{
      b.classList.remove('active');
    });
    document.querySelectorAll('#advMainTabs .adv-tab').forEach(b=>{
      if(b.textContent.includes(token==='__unlinked__'?'미연결':(allAdvMap[token]?.userName||'')) ) b.classList.add('active');
    });

    const campTabsArea = document.getElementById('campTabsArea');
    if (!campTabsArea) return;

    if (token === '__unlinked__') {
      const unlinked = Object.values(allAdvMap).filter(a=>!a.linked);
      const campIds = [...new Set(unlinked.map(a=>a.campsList[0]?.campId).filter(Boolean))];
      campTabsArea.innerHTML = `<div class="section-title">캠페인 선택</div><div class="camp-tabs">${
        campIds.map(cid=>{
          const camp = camps.find(c=>c.id===cid);
          return `<button class="camp-tab ${selCampId===cid?'active':''}" onclick="window._selCampUnlinked('${cid}')">${camp?.name||cid}</button>`;
        }).join('')
      }</div>`;
      if (campIds.length) await selCampForAdv(campIds[0], '__unlinked__');
    } else {
      const a = allAdvMap[token];
      campTabsArea.innerHTML = `<div class="section-title">캠페인 선택</div><div class="camp-tabs">${
        a.campsList.map(c=>`<button class="camp-tab ${selCampId===c.campId?'active':''}" onclick="window._selCampLinked('${c.campId}','${token}')">${c.campName}</button>`).join('')
      }</div>`;
      if (a.campsList.length) await selCampForAdv(a.campsList[0].campId, token);
    }
  }

  async function selCampForAdv(campId2, advToken) {
    selCampId=campId2; selToken=null; allData=[]; advs=[]; confMap={}; selMap={};
    // 캠페인 탭 active 갱신
    document.querySelectorAll('#campTabsArea .camp-tab').forEach(b=>{
      b.classList.toggle('active', b.textContent===(camps.find(c=>c.id===campId2)?.name||campId2));
    });
    const cd=await getDoc(doc(db,'campaigns',campId2));
    campData=cd.data();
    const rs=await getDocs(collection(db,'campaigns',campId2,'rows'));
    rs.forEach(d=>allData.push(d.data()));
    allData.sort((a,b)=>(a._index||0)-(b._index||0));

    if (advToken === '__unlinked__') {
      const as=await getDocs(collection(db,'campaigns',campId2,'advertisers'));
      as.forEach(d=>{ const a=d.data(); if(!allAdvMap[a.token]?.linked) advs.push({id:d.id,...a}); });
    } else {
      const advDoc=await getDoc(doc(db,'campaigns',campId2,'advertisers',advToken));
      if(advDoc.exists()) advs=[{id:advDoc.id,...advDoc.data(),userName:allAdvMap[advToken]?.userName}];
    }
    const cs=await getDocs(collection(db,'campaigns',campId2,'confirmed'));
    cs.forEach(d=>confMap[d.id]=d.data());
    const ss=await getDocs(collection(db,'campaigns',campId2,'selections'));
    ss.forEach(d=>selMap[d.id]=d.data().selections||{});

    const rc=document.getElementById('rcontent');
    if(!rc) return;
    if(!advs.length){rc.innerHTML='<div class="empty">광고주가 없습니다</div>';return;}
    if(advs.length>1){
      rc.innerHTML=`<div class="adv-tabs" style="margin-top:12px">${advs.map(a=>`<button class="adv-tab" onclick="window._rsa('${a.token}')"><div class="dot ${confMap[a.token]?'dot-ok':'dot-pending'}"></div>${a.userName||'미연결'}${confMap[a.token]?' ✓':''}</button>`).join('')}</div><div id="rcontent2"></div>`;
      renderAdvView(advs[0].token);
    } else {
      renderAdvView(advs[0].token);
    }
  }

  window._selAdvMap = async function(t) { await selAdvFromMap(t); };
  window._selCampUnlinked = async function(cid) { await selCampForAdv(cid,'__unlinked__'); };
  window._selCampLinked = async function(cid,t) { await selCampForAdv(cid,t); };

  function renderCampTabs() { return ''; }
  function renderAdvTabs() { return ''; }
  function renderMainCard() {}

  async function selCamp(id) {
    await selCampForAdv(id, '__unlinked__');
  }

  function renderAdvView(token) {
    selToken = token;
    // 탭 갱신
    const atabs = document.getElementById('atabs');
    if (atabs) atabs.innerHTML = renderAdvTabs();

    const a = advs.find(x=>x.token===token);
    if (!a) return;
    const conf = confMap[token];
    const allHeaders = campData.headers||[];
    const visHeaders = isAdv ? (campData.visibleHeaders||allHeaders) : allHeaders;
    const kakaoCol = allHeaders.find(h=>h.includes('카카오')||h.toLowerCase().includes('kakao'));

    let sels = selMap[token]||{};
    if (conf && !Object.keys(sels).length) {
      const idxs = conf.selectedIndices||[];
      idxs.forEach(i=>sels[i]='selected');
    }
    curSels = {...sels};
    curIsConf = !!conf;

    const selRows = allData.map((r,i)=>({r,i,status:sels[i]||'pending'}));
    const selCnt = selRows.filter(x=>x.status==='selected').length;
    const rejCnt = selRows.filter(x=>x.status==='rejected').length;
    const pendCnt = selRows.filter(x=>x.status==='pending').length;
    const confAt = conf&&conf.confirmedAt?new Date(conf.confirmedAt.seconds*1000).toLocaleString('ko-KR'):'';
    const maxSel = a.maxSelect||0;

    window._curAllRows=selRows; window._curAdv=a; window._allHeaders=allHeaders; window._visHeaders=visHeaders; window._kakaoCol=kakaoCol; window._curCampId=selCampId; window._curToken=token;

    const rc = document.getElementById('rcontent');
    if (!rc) return;

    rc.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;margin-top:16px">
        <div>
          <div style="font-size:15px;font-weight:700">${a.userName||a.name}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:3px">총 ${allData.length}명${maxSel?` · 최대 ${maxSel}명`:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${conf?`<div class="conf-badge">✅ 확정완료 · ${confAt}</div>`:`<div class="pend-badge">⏳ 미확정</div>`}
          ${!conf?`<button class="btn btn-accent btn-sm" onclick="window._confResult()">✔ 명단 확정</button>`:''}
          <button class="btn btn-ghost btn-sm" onclick="window._dlr()">⬇ 엑셀</button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        <div class="stat-box"><div class="num" style="color:var(--accent)">${allData.length}</div><div class="lbl">총 신청</div></div>
        <div class="stat-box"><div class="num" style="color:var(--success)">${selCnt}</div><div class="lbl">선정</div></div>
        <div class="stat-box"><div class="num" style="color:var(--danger)">${rejCnt}</div><div class="lbl">탈락</div></div>
        <div class="stat-box"><div class="num" style="color:var(--text-muted)">${pendCnt}</div><div class="lbl">미검토</div></div>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center" id="rfilters">
        <button class="filter-btn ${curFilter==='all'?'active':''}" onclick="window._rfilt('all')">전체 ${allData.length}</button>
        <button class="filter-btn ${curFilter==='selected'?'sel-active':''}" onclick="window._rfilt('selected')">선정 ${selCnt}</button>
        <button class="filter-btn ${curFilter==='rejected'?'rej-active':''}" onclick="window._rfilt('rejected')">탈락 ${rejCnt}</button>
        <button class="filter-btn ${curFilter==='pending'?'active':''}" onclick="window._rfilt('pending')">미검토 ${pendCnt}</button>
        <input class="search-input" id="rsearch" placeholder="🔍 검색..." style="margin-left:auto" oninput="window._rsearchFn()">
      </div>

      <div id="rtableWrap"></div>`;

    renderRTable();
  }

  function renderRTable() {
    const wrap = document.getElementById('rtableWrap'); if(!wrap)return;
    const rows = window._curAllRows||[];
    const h = window._visHeaders||[];
    const allH = window._allHeaders||[];
    const kakaoCol = window._kakaoCol;
    const conf = confMap[selToken];
    const searchVal = document.getElementById('rsearch')?.value.toLowerCase()||'';

    let filtered = rows;
    if (curFilter!=='all') filtered = rows.filter(x=>x.status===curFilter);
    if (searchVal) filtered = filtered.filter(({r})=>h.some(col=>String(r[col]||'').toLowerCase().includes(searchVal)));

    if (!filtered.length) { wrap.innerHTML='<div class="empty" style="padding:32px">조건에 맞는 체험단이 없습니다</div>'; return; }

    wrap.innerHTML=`<div class="rtable-wrap"><table class="rtable">
      <thead><tr>
        <th>#</th>
        ${h.map(col=>`<th ${!isAdv&&col===kakaoCol?'class="private"':''}>${col}${!isAdv&&col===kakaoCol?' 🔒':''}</th>`).join('')}
        <th>상태</th>
        ${!isAdv&&kakaoCol?'<th>카카오</th>':''}
        ${!conf?'<th>선정여부</th>':''}
      </tr></thead>
      <tbody>${filtered.map(({r,i,status})=>`<tr class="${status==='selected'?'row-sel':status==='rejected'?'row-rej':''}">
        <td><span class="row-num">${i+1}</span></td>
        ${h.map(col=>`<td title="${r[col]||''}">${cell(r[col])}</td>`).join('')}
        <td>${
          status==='selected'
            ?'<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;background:var(--success-dim);color:var(--success);font-size:10px;font-weight:600">✓ 선정</span>'
            :status==='rejected'
            ?'<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;background:var(--danger-dim);color:var(--danger);font-size:10px;font-weight:600">✗ 탈락</span>'
            :'<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:10px;background:var(--surface2);color:var(--text-muted);font-size:10px">· 미검토</span>'
        }</td>
        ${!isAdv&&kakaoCol?`<td>${r[kakaoCol]?`<button class="btn-kakao" onclick="navigator.clipboard.writeText('${r[kakaoCol]}').then(()=>toast('✅','카카오톡 ID 복사됨'))">복사</button>`:'-'}</td>`:''}
        ${!conf?`<td><div style="display:flex;gap:5px">
          <button class="btn-sel ${status==='selected'?'active':''}" onclick="window._ssResult(${i},'selected')">✓ 선정</button>
          <button class="btn-rej ${status==='rejected'?'active':''}" onclick="window._ssResult(${i},'rejected')">✗ 탈락</button>
        </div></td>`:''}
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  window._rsearchFn = function() { renderRTable(); };

  window._rfilt = function(f) {
    curFilter=f;
    document.querySelectorAll('#rfilters .filter-btn').forEach(b=>b.className='filter-btn');
    const btns=document.querySelectorAll('#rfilters .filter-btn');
    const map=['all','selected','rejected','pending'];
    btns.forEach((b,idx)=>{
      if(map[idx]===f){
        if(f==='selected') b.classList.add('sel-active');
        else if(f==='rejected') b.classList.add('rej-active');
        else b.classList.add('active');
      }
    });
    renderRTable();
  };

  window._ssResult = async function(i, status) {
    if (curIsConf) { toast('⚠️','명단이 확정되어 수정할 수 없습니다'); return; }
    const campId = window._curCampId;
    const token = window._curToken;
    const a = advs.find(x=>x.token===token);
    const maxSel = a?.maxSelect||0;
    const sc = Object.values(curSels).filter(v=>v==='selected').length;
    if (status==='selected'&&curSels[i]!=='selected'&&maxSel>0&&sc>=maxSel) { toast('⚠️',`선정 인원 제한(${maxSel}명)에 도달했습니다`); return; }
    if (curSels[i]===status) delete curSels[i]; else curSels[i]=status;
    await setDoc(doc(db,'campaigns',campId,'selections',token),{selections:curSels,updatedAt:serverTimestamp()});
    selMap[token] = {...curSels};
    // 화면 갱신
    window._curAllRows = allData.map((r,idx)=>({r,i:idx,status:curSels[idx]||'pending'}));
    renderRTable();
    // 상태 카운트 갱신
    const selCnt=Object.values(curSels).filter(v=>v==='selected').length;
    const rejCnt=Object.values(curSels).filter(v=>v==='rejected').length;
    const pendCnt=allData.length-selCnt-rejCnt;
    document.querySelectorAll('#rfilters .filter-btn')[0].textContent=`전체 ${allData.length}`;
    document.querySelectorAll('#rfilters .filter-btn')[1].textContent=`선정 ${selCnt}`;
    document.querySelectorAll('#rfilters .filter-btn')[2].textContent=`탈락 ${rejCnt}`;
    document.querySelectorAll('#rfilters .filter-btn')[3].textContent=`미검토 ${pendCnt}`;
  };

  window._confResult = async function() {
    const campId = window._curCampId;
    const token = window._curToken;
    const a = advs.find(x=>x.token===token);
    const sc = Object.values(curSels).filter(v=>v==='selected').length;
    if (!sc) { toast('⚠️','선정된 체험단이 없습니다'); return; }
    if (!confirm(`선정 ${sc}명으로 명단을 확정하시겠습니까?`)) return;
    await setDoc(doc(db,'campaigns',campId,'confirmed',token),{
      advertiserName:a.name, token:token, confirmedAt:serverTimestamp(),
      selectedIndices:Object.keys(curSels).filter(i=>curSels[i]==='selected').map(Number)
    });
    confMap[token] = { advertiserName:a.name, token, confirmedAt:{seconds:Date.now()/1000}, selectedIndices:Object.keys(curSels).filter(i=>curSels[i]==='selected').map(Number) };
    curIsConf = true;
    toast('✅','명단이 확정되었습니다','success-t');
    renderAdvView(token);
  };

  window._dlr = function() {
    const rows = window._curAllRows; const a = window._curAdv; const h = window._visHeaders;
    if (!rows||!rows.length) return;
    let filtered = rows;
    if (curFilter!=='all') filtered = rows.filter(x=>x.status===curFilter);
    if (!filtered.length) { toast('⚠️','다운로드할 데이터가 없습니다'); return; }
    const statusLabel={selected:'선정',rejected:'탈락',pending:'미검토'};
    const data = filtered.map(({r,i,status},idx)=>{
      const o={순번:idx+1,상태:statusLabel[status]||''};
      h.forEach(k=>o[k]=r[k]);
      return o;
    });
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'결과');
    const filterName=curFilter==='all'?'전체':curFilter==='selected'?'선정':curFilter==='rejected'?'탈락':'미검토';
    XLSX.writeFile(wb,`${a.userName||a.name}_${filterName}_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('✅',`${filtered.length}명 결과를 다운로드했습니다`,'success-t');
  };

  window._rsc = async function(id) { await selCamp(id); };
  window._rsa = async function(t) { curFilter='all'; renderAdvView(t); };

  window._goAdvLink = async function() {
    const link = document.getElementById('advLinkInput')?.value.trim();
    if (!link) { toast('⚠️','링크를 입력해주세요','error'); return; }
    try {
      const u = new URL(link);
      const c = u.searchParams.get('c');
      const t = u.searchParams.get('t');
      if (!c || !t) { toast('⚠️','올바른 선정 링크가 아닙니다','error'); return; }
      const udSnap = await getDoc(doc(db,'users',currentUser.uid));
      const udData = udSnap.data();
      const conns = udData.connections||[];
      if (!conns.find(x=>x.campId===c&&x.token===t)) {
        conns.push({campId:c, token:t});
        await setDoc(doc(db,'users',currentUser.uid), { connections:conns }, { merge:true });
      }
      location.reload();
    } catch(e) {
      toast('⚠️','올바른 링크 형식이 아닙니다','error');
    }
  };

  await loadData();
}

// ══════════════════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════════════════
async function main() {
  // viewer URL 접속 시 result로 리다이렉트
  if (PAGE === 'viewer') {
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        go('login', `&redirect=viewer&c=${CAMP_ID||''}&t=${TOKEN||''}`);
        return;
      }
      const ud = await getUserData(user.uid);
      if (!ud) { go('login'); return; }
      // viewer URL의 c, t를 유저에 저장 후 result로
      if (CAMP_ID && TOKEN && ud.role === 'advertiser') {
        const conns = ud.connections||[];
        if (!conns.find(c=>c.campId===CAMP_ID&&c.token===TOKEN)) {
          conns.push({campId:CAMP_ID, token:TOKEN});
          await setDoc(doc(db,'users',user.uid), { connections:conns }, { merge:true });
        }
      }
      go('result');
    });
    return;
  }

  if (PAGE === 'login') { await renderLogin(); return; }
  if (PAGE === 'register') { await renderRegister(); return; }

  document.getElementById('root').innerHTML = '<div class="loading">인증 확인 중...</div>';

  onAuthStateChanged(auth, async (user) => {
    if (!user) { go('login'); return; }
    currentUser = user;
    currentUserData = await getUserData(user.uid);
    if (!currentUserData) { await signOut(auth); go('login'); return; }
    if (currentUserData.status === 'pending') { await signOut(auth); toast('⚠️','승인 대기 중입니다','error'); go('login'); return; }

    if (PAGE === 'admin') await renderAdmin(currentUserData);
    else if (PAGE === 'result') await renderResult(currentUserData);
    else if (PAGE === 'members') await renderMembers(currentUserData);
    else if (PAGE === 'profile') await renderProfile(currentUserData);
    else go('admin');
  });
}

main();
</script>
