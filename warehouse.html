<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>창고 — 계정 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c26;
      --border: #2a2a3a; --accent: #c8f065; --accent2: #7b61ff;
      --text: #e8e8f0; --muted: #6b6b80; --danger: #ff5f5f;
      --warning: #f0a050; --success: #4caf82;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; padding: 40px 24px; }
    header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: var(--accent2); }
    .badge { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .btn-workbench { background: transparent; border: 1px solid var(--accent); border-radius: 8px; padding: 10px 20px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-workbench:hover { background: var(--accent); color: #0a0a0f; }
    .nav-area { margin-bottom: 20px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .tab { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 18px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .tab:hover { border-color: var(--accent2); color: var(--accent2); }
    .tab.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .tab.wishlist-tab { border-color: var(--warning); color: var(--warning); }
    .tab.wishlist-tab.active { background: var(--warning); border-color: var(--warning); color: #0a0a0f; }
    .folder-bar { display: none; flex-wrap: wrap; gap: 8px; padding: 14px 0 4px; border-top: 1px solid var(--border); margin-top: 12px; }
    .folder-bar.open { display: flex; }
    .folder-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .folder-chip:hover { border-color: var(--warning); color: var(--warning); }
    .folder-chip.active { background: var(--warning); border-color: var(--warning); color: #0a0a0f; font-weight: 500; }
    .folder-chip-add { border-color: var(--success); color: var(--success); }
    .folder-chip-add:hover { background: var(--success); color: #0a0a0f; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; }
    .search-box:focus { border-color: var(--accent2); }
    .search-box::placeholder { color: var(--muted); }
    .btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-green { border-color: var(--success); color: var(--success); }
    .btn-green:hover { background: var(--success); color: #0a0a0f; }
    .btn-red { border-color: var(--danger); color: var(--danger); }
    .btn-red:hover { background: var(--danger); color: #fff; }
    .col-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
    .chip-label { font-size: 11px; color: var(--muted); }
    .col-chip { padding: 4px 12px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--muted); transition: all 0.2s; }
    .col-chip.on { background: var(--surface2); border-color: var(--accent2); color: var(--text); }
    th[draggable] { cursor: grab; user-select: none; }
    th[draggable]:active { cursor: grabbing; }
    th.drag-over { background: rgba(123,97,255,0.3); border-left: 2px solid var(--accent2); }
    th.dragging { opacity: 0.4; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .table-scroll { overflow-x: auto; max-height: 520px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2; }
    th { padding: 12px 14px; text-align: left; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 10px 14px; color: var(--text); vertical-align: middle; }
    td.num { color: var(--accent); font-weight: 500; }
    .url-btn { color: var(--accent2); text-decoration: none; font-size: 11px; padding: 2px 8px; border: 1px solid var(--accent2); border-radius: 4px; transition: all 0.2s; display: inline-block; white-space: nowrap; }
    .url-btn:hover { background: var(--accent2); color: white; }
    .email-chip { color: var(--warning); border: 1px solid rgba(240,160,80,0.4); border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
    .cell-edit { cursor: pointer; border-radius: 4px; padding: 2px 4px; display: inline-block; }
    .cell-edit:hover { background: rgba(123,97,255,0.15); }
    .cell-edit input { background: var(--surface2); border: 1px solid var(--accent2); border-radius: 4px; padding: 3px 8px; font-size: 12px; color: var(--text); outline: none; font-family: 'DM Mono', monospace; min-width: 100px; }
    .muted-val { color: var(--muted); font-size: 12px; }
    .del-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .del-btn:hover { border-color: var(--danger); color: var(--danger); }
    .save-wrap { position: relative; display: inline-block; }
    .save-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .save-btn:hover { border-color: var(--warning); color: var(--warning); }
    .save-btn.saved { border-color: var(--success); color: var(--success); background: rgba(76,175,130,0.1); }
    .save-menu { display: none; position: absolute; right: 0; top: calc(100% + 4px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; min-width: 140px; z-index: 20; }
    .save-menu.open { display: block; }
    .save-menu-item { padding: 9px 14px; font-size: 12px; cursor: pointer; color: var(--text); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .save-menu-item:last-child { border-bottom: none; }
    .save-menu-item:hover { background: var(--surface); }
    .save-menu-item.in-folder { color: var(--success); }
    .folder-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .folder-header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 28px; min-width: 300px; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; margin-bottom: 16px; }
    .modal input:focus { border-color: var(--accent2); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--accent); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 200; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .empty-state { text-align: center; padding: 60px 40px; color: var(--muted); font-size: 14px; }
    .loading { text-align: center; padding: 60px 40px; color: var(--muted); font-size: 14px; }
    .stat-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 12px; color: var(--muted); }
    .stat b { color: var(--accent); font-size: 20px; display: block; margin-bottom: 2px; font-family: 'Syne', sans-serif; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="badge">창고</div>
      <div class="logo">insta<span>store</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
      <div class="badge">계정 데이터 관리</div>
      <a href="instaviewer.html" class="btn-workbench">← 작업대로 이동</a>
    </div>
  </header>

  <div class="stat-bar" id="stat-bar"><div class="loading">데이터 불러오는 중...</div></div>

  <div class="nav-area">
    <div class="tabs">
      <button class="tab active" id="tab-all" onclick="window.switchTab('all')">전체 목록</button>
      <button class="tab wishlist-tab" id="tab-wishlist" onclick="window.toggleWishlist()">관심 목록 ▾</button>
    </div>
    <div class="folder-bar" id="folder-bar"></div>
  </div>

  <div id="view-all">
    <div class="toolbar">
      <input class="search-box" id="searchBox" placeholder="검색..." oninput="window.doFilter(this.value)" />
      <button class="btn btn-green" onclick="window.showAddCol()">+ 컬럼 추가</button>
      <button class="btn" onclick="window.exportData()">↓ 내보내기</button>
      <button class="btn btn-red" onclick="window.clearAll()">🗑 전체 삭제</button>
    </div>
    <div class="col-chips" id="col-chips"></div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table><thead><tr id="thead-all"></tr></thead><tbody id="tbody-all"><tr><td class="loading">데이터 불러오는 중...</td></tr></tbody></table>
      </div>
    </div>
  </div>

  <div id="view-folder" style="display:none;">
    <div class="folder-header">
      <div class="folder-header-title" id="folder-view-title"></div>
      <button class="btn btn-red" onclick="window.deleteFolder()">폴더 삭제</button>
      <button class="btn" onclick="window.exportData(true)" style="margin-left:auto;">↓ 내보내기</button>
    </div>
    <div class="table-wrap">
      <div class="table-scroll">
        <table><thead><tr id="thead-folder"></tr></thead><tbody id="tbody-folder"></tbody></table>
      </div>
    </div>
  </div>

  <div id="modal-area"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA0dUb1p0wAWZHvDPlmG_WO3QJ7xhSYJ5s",
    authDomain: "dscrew-6da8c.firebaseapp.com",
    projectId: "dscrew-6da8c",
    storageBucket: "dscrew-6da8c.firebasestorage.app",
    messagingSenderId: "235741797636",
    appId: "1:235741797636:web:5e9c9cf83751fc0504c451",
    measurementId: "G-60G8QVFVCL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let data = [];
  let folders = [];
  let baseCols = [];
  let customCols = [];
  let colVisible = {};
  let currentTab = 'all';
  let currentFolder = null;
  let filtered = [];
  let wishlistOpen = false;
  let openMenu = null;

  const PLATFORMS = [
    { names:['instagram.com'], label:'인스타' }, { names:['youtube.com','youtu.be'], label:'유튜브' },
    { names:['tiktok.com'], label:'틱톡' }, { names:['clip.kakao.com'], label:'클립' },
    { names:['twitter.com','x.com'], label:'X' }, { names:['threads.net'], label:'스레드' },
    { names:['facebook.com'], label:'페이스북' }, { names:['blog.naver.com'], label:'네이버' },
  ];
  function getPlatform(url) {
    if (!url) return '링크';
    const l = url.toLowerCase();
    for (const p of PLATFORMS) if (p.names.some(n => l.includes(n))) return p.label;
    return '링크';
  }
  const URL_KEYS = ['url', 'link', '링크', '주소', 'profile'];
  const NUM_KEYS = ['팔로워', '팔로잉', 'followers', 'following', '게시물', 'posts', 'count', '수'];
  function isUrlCol(col) { return URL_KEYS.some(k => col.toLowerCase().includes(k)); }
  function isNumCol(col) { return NUM_KEYS.some(k => col.toLowerCase().includes(k)); }

  function getIdKey() { return baseCols.find(c => c.toLowerCase().includes('username') || c.includes('유저')) || baseCols[0] || 'id'; }

  function refreshCols(savedOrder) {
    const allKeys = new Set();
    data.forEach(row => Object.keys(row).forEach(k => { if (k !== '__id') allKeys.add(k); }));
    const allKeysArr = [...allKeys];
    if (savedOrder && savedOrder.length > 0) {
      // 저장된 순서 기준으로 정렬, 새 컬럼은 뒤에 추가
      const ordered = savedOrder.filter(c => allKeysArr.includes(c));
      const newCols = allKeysArr.filter(c => !ordered.includes(c));
      baseCols = [...ordered, ...newCols];
    } else {
      baseCols = allKeysArr;
    }
    baseCols.forEach(c => { if (colVisible[c] === undefined) colVisible[c] = true; });
  }

  async function saveColOrder() {
    try {
      await setDoc(doc(db, 'instaviewer_settings', 'colOrder'), { order: baseCols });
    } catch(e) { console.warn('컬럼 순서 저장 실패', e); }
  }

  // ── Firebase 데이터 로드 ───────────────────────────
  async function loadData() {
    try {
      const [snap, fSnap, settingSnap] = await Promise.all([
        getDocs(collection(db, 'instaviewer')),
        getDocs(collection(db, 'instaviewer_folders')),
        getDocs(collection(db, 'instaviewer_settings')),
      ]);
      data = snap.docs.map(d => ({ ...d.data(), __id: d.id }));
      folders = fSnap.docs.map(d => ({ ...d.data(), id: d.id }));
      const colOrderDoc = settingSnap.docs.find(d => d.id === 'colOrder');
      const savedOrder = colOrderDoc ? colOrderDoc.data().order : [];
      refreshCols(savedOrder);
      filtered = [...data];
      renderStats();
      renderChips();
      renderAll();
      renderFolderBar();
    } catch(e) {
      showToast('❌ 데이터 로드 실패: ' + e.message);
    }
  }

  // ── 통계 ──────────────────────────────────────────
  function renderStats() {
    document.getElementById('stat-bar').innerHTML = `
      <div class="stat"><b>${data.length.toLocaleString()}</b>전체 계정</div>
      <div class="stat"><b>${folders.length}</b>관심 폴더</div>
      <div class="stat"><b>${folders.reduce((a,f)=>a+f.items.length,0)}</b>관심 저장</div>`;
  }

  // ── 컬럼 칩 ──────────────────────────────────────
  function renderChips() {
    const wrap = document.getElementById('col-chips');
    if (!wrap) return;
    wrap.innerHTML = '<span class="chip-label">컬럼:</span>' +
      baseCols.map(c => `<span class="col-chip ${colVisible[c]!==false?'on':''}" onclick="toggleChip('${c}')">${c}</span>`).join('') +
      customCols.map(c => `<span class="col-chip ${colVisible[c.key]!==false?'on':''}" onclick="toggleChip('${c.key}')">${c.label}</span>`).join('');
  }
  window.toggleChip = function(col) {
    colVisible[col] = colVisible[col] === false ? true : false;
    renderChips();
    if (currentTab === 'all') renderAll(); else renderFolder();
  };

  function getVisibleCols() {
    return [...baseCols, ...customCols.map(c=>c.key)].filter(c => colVisible[c] !== false);
  }

  // ── 셀 렌더 ───────────────────────────────────────
  function renderCell(row, col) {
    const val = row[col] !== undefined ? row[col] : '';
    const docId = row.__id;
    if (isUrlCol(col) && String(val).startsWith('http')) {
      return `<td onclick="startEdit(this,'${docId}','${col}')">
        ${val ? `<a class="url-btn" href="${val}" target="_blank" onclick="event.stopPropagation()">→ ${getPlatform(val)}</a>` : '<span class="muted-val">—</span>'}
      </td>`;
    }
    if (col === '이메일' || col.toLowerCase().includes('email')) {
      return `<td onclick="startEdit(this,'${docId}','${col}')">
        ${val ? `<span class="email-chip" onclick="event.stopPropagation();copyEmail('${val}')">${val} 📋</span>` : '<span class="muted-val">—</span>'}
      </td>`;
    }
    if (isNumCol(col)) {
      return `<td class="num" onclick="startEdit(this,'${docId}','${col}')"><span class="cell-edit">${val ? Number(val).toLocaleString() : '<span class="muted-val">—</span>'}</span></td>`;
    }
    return `<td onclick="startEdit(this,'${docId}','${col}')"><span class="cell-edit">${val || '<span class="muted-val">—</span>'}</span></td>`;
  }

  window.startEdit = function(td, docId, col) {
    const row = data.find(r => r.__id === docId);
    const cur = row ? (row[col] || '') : '';
    td.innerHTML = `<input value="${cur}" onblur="commitEdit(this,'${docId}','${col}')" onkeydown="if(event.key==='Enter')this.blur()" />`;
    td.querySelector('input').focus();
  };

  window.commitEdit = async function(input, docId, col) {
    const val = input.value;
    const row = data.find(r => r.__id === docId);
    if (row) {
      row[col] = val;
      try {
        await updateDoc(doc(db, 'instaviewer', docId), { [col]: val });
        showToast('✅ 수정됨');
      } catch(e) { showToast('❌ 수정 실패: ' + e.message); }
    }
    if (currentTab === 'all') renderAll(); else renderFolder();
  };

  // ── 삭제 ──────────────────────────────────────────
  window.deleteRow = async function(docId) {
    if (!confirm('이 계정을 창고에서 삭제할까요?')) return;
    try {
      await deleteDoc(doc(db, 'instaviewer', docId));
      const idKey = getIdKey();
      const row = data.find(r => r.__id === docId);
      const username = row ? row[idKey] : null;
      data = data.filter(r => r.__id !== docId);
      if (username) {
        folders.forEach(f => { f.items = f.items.filter(u => u !== username); });
        for (const f of folders) await setDoc(doc(db, 'instaviewer_folders', f.id), f);
      }
      filtered = filtered.filter(r => r.__id !== docId);
      refreshCols(); renderStats(); renderAll();
      showToast('🗑 삭제됐습니다');
    } catch(e) { showToast('❌ 삭제 실패: ' + e.message); }
  };

  window.clearAll = async function() {
    if (!confirm(`창고의 전체 데이터(${data.length}개)를 삭제할까요?`)) return;
    try {
      for (const row of data) await deleteDoc(doc(db, 'instaviewer', row.__id));
      for (const f of folders) await deleteDoc(doc(db, 'instaviewer_folders', f.id));
      data = []; folders = []; filtered = [];
      refreshCols(); renderStats(); renderChips(); renderAll(); renderFolderBar();
      showToast('🗑 전체 삭제됐습니다');
    } catch(e) { showToast('❌ 삭제 실패: ' + e.message); }
  };

  // ── 관심목록 저장 버튼 ────────────────────────────
  function renderSaveBtn(row) {
    const idKey = getIdKey();
    const username = row[idKey];
    const inFolders = folders.filter(f => f.items && f.items.includes(username));
    return `<div class="save-wrap">
      <button class="save-btn ${inFolders.length?'saved':''}" onclick="toggleSaveMenu(event,'${username}')">
        관심목록 ${inFolders.length?'✓':''} ▾
      </button>
      <div class="save-menu" id="smenu-${username}">
        ${folders.length
          ? folders.map(f=>`<div class="save-menu-item ${f.items&&f.items.includes(username)?'in-folder':''}" onclick="toggleFolderItem('${username}','${f.id}')">
              ${f.items&&f.items.includes(username)?'✓ ':''} ${f.name}
            </div>`).join('')
          : '<div class="save-menu-item muted-val">폴더를 먼저 추가하세요</div>'}
      </div>
    </div>`;
  }

  window.toggleSaveMenu = function(e, username) {
    e.stopPropagation();
    const menu = document.getElementById('smenu-'+username);
    if (openMenu && openMenu !== menu) openMenu.classList.remove('open');
    menu.classList.toggle('open');
    openMenu = menu.classList.contains('open') ? menu : null;
  };
  document.addEventListener('click', () => { if (openMenu) { openMenu.classList.remove('open'); openMenu=null; } });

  window.toggleFolderItem = async function(username, fid) {
    const folder = folders.find(f=>f.id===fid);
    if (!folder) return;
    if (!folder.items) folder.items = [];
    if (folder.items.includes(username)) folder.items = folder.items.filter(u=>u!==username);
    else folder.items.push(username);
    try {
      await setDoc(doc(db, 'instaviewer_folders', fid), folder);
      renderStats(); renderFolderBar(); renderAll();
      if (currentTab === 'folder') renderFolder();
    } catch(e) { showToast('❌ 저장 실패: ' + e.message); }
  };

  // ── 전체목록 렌더 ─────────────────────────────────
  function renderAll() {
    const cols = getVisibleCols();
    document.getElementById('thead-all').innerHTML =
      cols.map((c,i)=>`<th draggable="true" data-col="${c}"
        ondragstart="dragStart(event,'${c}')"
        ondragover="dragOver(event)"
        ondragleave="dragLeave(event)"
        ondrop="dropCol(event,'${c}')"
        ondragend="dragEnd(event)"
      >${c}</th>`).join('') + '<th>관심목록</th><th>삭제</th>';
    document.getElementById('tbody-all').innerHTML = filtered.length
      ? filtered.map(row => `<tr>
          ${cols.map(c=>renderCell(row,c)).join('')}
          <td>${renderSaveBtn(row)}</td>
          <td><button class="del-btn" onclick="deleteRow('${row.__id}')">삭제</button></td>
        </tr>`).join('')
      : `<tr><td colspan="${cols.length+2}" class="empty-state">${data.length===0?'창고가 비어있습니다. 작업대에서 데이터를 보내주세요!':'검색 결과가 없습니다'}</td></tr>`;
  }

  // ── 폴더뷰 렌더 ───────────────────────────────────
  function renderFolder() {
    if (!currentFolder) return;
    document.getElementById('folder-view-title').textContent = `🗂 ${currentFolder.name}  (${(currentFolder.items||[]).length}개)`;
    const cols = getVisibleCols();
    document.getElementById('thead-folder').innerHTML = cols.map(c=>`<th>${c}</th>`).join('') + '<th>제거</th>';
    const idKey = getIdKey();
    const rows = data.filter(r => currentFolder.items && currentFolder.items.includes(r[idKey]));
    document.getElementById('tbody-folder').innerHTML = rows.length
      ? rows.map(row=>`<tr>
          ${cols.map(c=>renderCell(row,c)).join('')}
          <td><button class="del-btn" onclick="removeFolderItem('${row[idKey]}')">제거</button></td>
        </tr>`).join('')
      : `<tr><td colspan="${cols.length+1}" class="empty-state">저장된 계정이 없습니다</td></tr>`;
  }

  window.removeFolderItem = async function(username) {
    if (!currentFolder) return;
    currentFolder.items = (currentFolder.items||[]).filter(u=>u!==username);
    try {
      await setDoc(doc(db, 'instaviewer_folders', currentFolder.id), currentFolder);
      renderStats(); renderFolderBar(); renderFolder();
    } catch(e) { showToast('❌ 실패: ' + e.message); }
  };

  // ── 탭 전환 ───────────────────────────────────────
  window.switchTab = function(tab) {
    currentTab = tab; currentFolder = null;
    wishlistOpen = false;
    document.getElementById('tab-wishlist').textContent = '관심 목록 ▾';
    document.getElementById('tab-wishlist').classList.remove('active');
    document.getElementById('folder-bar').classList.remove('open');
    document.getElementById('tab-all').classList.add('active');
    document.getElementById('view-all').style.display = 'block';
    document.getElementById('view-folder').style.display = 'none';
    renderAll();
  };

  window.toggleWishlist = function() {
    wishlistOpen = !wishlistOpen;
    const btn = document.getElementById('tab-wishlist');
    btn.textContent = `관심 목록 ${wishlistOpen?'▴':'▾'}`;
    btn.classList.toggle('active', wishlistOpen || currentTab==='folder');
    document.getElementById('folder-bar').classList.toggle('open', wishlistOpen);
    renderFolderBar();
  };

  window.openFolder = function(fid) {
    currentFolder = folders.find(f=>f.id===fid);
    currentTab = 'folder';
    document.getElementById('tab-all').classList.remove('active');
    document.getElementById('tab-wishlist').classList.add('active');
    document.getElementById('view-all').style.display = 'none';
    document.getElementById('view-folder').style.display = 'block';
    renderFolderBar(); renderFolder();
  };

  function renderFolderBar() {
    document.getElementById('folder-bar').innerHTML =
      '<span style="font-size:11px;color:var(--muted);align-self:center;">폴더:</span>' +
      folders.map(f=>`<span class="folder-chip ${currentFolder&&currentFolder.id===f.id?'active':''}" onclick="openFolder('${f.id}')">${f.name} <span style="opacity:0.6;font-size:10px;">${(f.items||[]).length}</span></span>`).join('') +
      `<span class="folder-chip folder-chip-add" onclick="window.showAddFolder()">+ 폴더 추가</span>`;
  }

  window.deleteFolder = async function() {
    if (!currentFolder) return;
    if (!confirm(`"${currentFolder.name}" 폴더를 삭제할까요?`)) return;
    try {
      await deleteDoc(doc(db, 'instaviewer_folders', currentFolder.id));
      folders = folders.filter(f=>f.id!==currentFolder.id);
      currentFolder = null;
      switchTab('all'); renderStats();
      showToast('폴더가 삭제됐습니다');
    } catch(e) { showToast('❌ 실패: ' + e.message); }
  };

  // ── 컬럼 드래그 순서 변경 ────────────────────────────
  let dragSrcCol = null;

  window.dragStart = function(e, col) {
    dragSrcCol = col;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  };
  window.dragOver = function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  };
  window.dragLeave = function(e) {
    e.currentTarget.classList.remove('drag-over');
  };
  window.dragEnd = function(e) {
    e.target.classList.remove('dragging');
    document.querySelectorAll('th.drag-over').forEach(el => el.classList.remove('drag-over'));
  };
  window.dropCol = async function(e, targetCol) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragSrcCol || dragSrcCol === targetCol) return;
    const srcIdx = baseCols.indexOf(dragSrcCol);
    const tgtIdx = baseCols.indexOf(targetCol);
    if (srcIdx < 0 || tgtIdx < 0) return;
    baseCols.splice(srcIdx, 1);
    baseCols.splice(tgtIdx, 0, dragSrcCol);
    dragSrcCol = null;
    renderChips();
    renderAll();
    await saveColOrder();
    showToast('✅ 컬럼 순서 저장됨');
  };

  // ── 검색 ──────────────────────────────────────────
  window.doFilter = function(q) {
    filtered = q ? data.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q.toLowerCase()))) : [...data];
    renderAll();
  };

  // ── 컬럼 추가 ─────────────────────────────────────
  window.showAddCol = function() {
    showModal('새 컬럼 추가', '컬럼 이름 (예: 카테고리, 검토여부)', name => {
      if (!baseCols.includes(name)) { baseCols.push(name); colVisible[name] = true; }
      renderChips(); renderAll();
    });
  };

  window.showAddFolder = function() {
    showModal('새 폴더 추가', '폴더 이름 (예: A급, 먹스타그램)', async name => {
      const fid = 'f' + Date.now();
      const folder = { id: fid, name, items: [] };
      try {
        await setDoc(doc(db, 'instaviewer_folders', fid), folder);
        folders.push(folder);
        renderStats(); renderFolderBar(); renderAll();
        showToast(`✅ "${name}" 폴더 추가됨`);
      } catch(e) { showToast('❌ 실패: ' + e.message); }
    });
  };

  // ── 내보내기 ──────────────────────────────────────
  window.exportData = function(folderOnly) {
    const idKey = getIdKey();
    const rows = folderOnly && currentFolder
      ? data.filter(r=>currentFolder.items&&currentFolder.items.includes(r[idKey]))
      : filtered;
    const cols = getVisibleCols();
    const out = rows.map(row=>{const obj={};cols.forEach(c=>{obj[c]=row[c]||'';});return obj;});
    const ws=XLSX.utils.json_to_sheet(out);const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Sheet1');
    XLSX.writeFile(wb,`warehouse_${Date.now()}.xlsx`);
    showToast(`✅ ${out.length}개 내보내기 완료!`);
  };

  // ── 유틸 ──────────────────────────────────────────
  window.copyEmail = function(email) { navigator.clipboard.writeText(email).then(()=>showToast(`📋 복사됨: ${email}`)).catch(()=>showToast('복사 실패')); };

  function showModal(title, placeholder, onConfirm) {
    document.getElementById('modal-area').innerHTML = `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-title">${title}</div>
          <input id="modal-input" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')confirmModal()" />
          <div class="modal-btns">
            <button class="btn" onclick="window.closeModal()">취소</button>
            <button class="btn btn-green" onclick="window.confirmModal()">확인</button>
          </div>
        </div>
      </div>`;
    window._modalCb = onConfirm;
    setTimeout(()=>document.getElementById('modal-input').focus(), 50);
  }
  window.confirmModal = function() { const val=document.getElementById('modal-input').value.trim(); if(!val)return; closeModal(); if(window._modalCb)window._modalCb(val); };
  window.closeModal = function() { document.getElementById('modal-area').innerHTML=''; };
  function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3500); }

  // ── 초기 로드 ─────────────────────────────────────
  loadData();
</script>
</body>
</html>
